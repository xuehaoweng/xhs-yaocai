<!DOCTYPE html>
<html>
<head>
    <!-- 保持原有样式不变 -->
        <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            position: relative; /* 使右上角按钮定位生效 */
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #2d5f4a;
            text-align: center;
        }
        h2 {
            color: #4CAF50;
            margin-top: 0;
        }
        .plant-img {
            width: 100%;
            height: 200px;
            border-radius: 10px;
            object-fit: cover;
            margin: 10px 0;
        }
        .tag {
            display: inline-block;
            background: #e8f5e9;
            color: #2d5f4a;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9em;
            margin: 5px;
        }

        /* 截图按钮样式 */
        .screenshot-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .screenshot-button:hover {
            background-color: #3e8e41;
        }

        /* 返回按钮样式 */
        .back-button {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #666;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        .back-button:hover {
            background-color: #555;
        }
    </style>

    <!-- 引入 html2canvas 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <!-- 返回按钮 -->
    <a href="index.html" class="back-button">← 返回首页</a>
    
    <button class="screenshot-button" onclick="captureScreenshot()">📸 截图</button>

    <div class="container">
        <h1>🌿路边本草图鉴 | 三步识药材</h1>

        <div class="card">
            <h2>夏枯草 | 清肝明目草</h2>
            <div class="plant-img" style="background: #e3f2e7; text-align: center">
                <img width="100%" height="200px" src="https://self-bucket-1258377547.cos.ap-shanghai.myqcloud.com/picgo-test/4279f495d6af0bf928f516c1682f9f71.jpeg">
            </div>
            <p>紫穗呈塔状，叶对生有锯齿。果穗入药，清肝泻火，明目散结，可制凉茶。</p>
            <div class="tag">📌山坡湿地常见</div>
            <div class="tag">💊主含夏枯草苷</div>
        </div>

        <div class="card">
            <h2>益母草 | 妇科圣药草</h2>
            <div class="plant-img" style="background: #fff3e0; text-align: center">
                <img width="100%" height="200px" src="https://self-bucket-1258377547.cos.ap-shanghai.myqcloud.com/picgo-test/faf4a8914ba7c6e3fd20d97aa6af3f4a.jpg">
            </div>
            <p>茎方叶掌裂，唇形花粉紫。全草入药，活血调经，利尿消肿，妇科常用。</p>
            <div class="tag">📌田间路旁遍分布</div>
            <div class="tag">💊含益母草碱</div>
        </div>

        <div class="card">
            <h2>马齿苋 | 五行长寿菜</h2>
            <div class="plant-img" style="background: #e8f5e9; text-align: center">
                <img width="100%" height="200px" src="https://self-bucket-1258377547.cos.ap-shanghai.myqcloud.com/picgo-test/172009cd5e6f054598c0f812603d52e0.jpg">
            </div>
            <p>茎红叶肉质，黄花五瓣生。清热解毒，凉血止血，可凉拌做野菜。</p>
            <div class="tag">📌菜园路边多簇生</div>
            <div class="tag">💊富含ω-3脂肪酸</div>
        </div>

        <p style="text-align: center; color: #666; font-size: 0.9em;">🌱遇见请珍惜 勿过度采摘 | 药用请遵医嘱</p>
    </div>
</body>
</html>
