<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            position: relative; /* 使右上角按钮定位生效 */
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #2d5f4a;
            text-align: center;
        }
        h2 {
            color: #4CAF50;
            margin-top: 0;
        }
        .plant-img {
            width: 100%;
            height: 200px;
            border-radius: 10px;
            object-fit: cover;
            margin: 10px 0;
        }
        .tag {
            display: inline-block;
            background: #e8f5e9;
            color: #2d5f4a;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9em;
            margin: 5px;
        }

        /* 截图按钮样式 */
        .screenshot-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .screenshot-button:hover {
            background-color: #3e8e41;
        }

        /* 返回按钮样式 */
        .back-button {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #666;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        .back-button:hover {
            background-color: #555;
        }
    </style>

    <!-- 引入 html2canvas 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <!-- 返回按钮 -->
    <a href="index.html" class="back-button">← 返回首页</a>
    
    <button class="screenshot-button" onclick="captureScreenshot()">📸 截图</button>

    <div class="container">
        <h1>🌿路边本草图鉴 | 三步识药材</h1>

        <!-- 灯心草 -->
        <div class="card">
            <h2>灯心草 | 清心降火利尿</h2>
            <div class="plant-img" style="background: #e3f2e7; text-align: center">
                <img width="100%" height="200px" src="https://self-bucket-1258377547.cos.ap-shanghai.myqcloud.com/picgo-test/bb7416d96e0a41b585008cf7f7d5c49b.jpg">
            </div>
            <p>茎细长圆柱形，髓心白色如灯芯。清心降火，利尿通淋，传统灯芯材料来源。</p>
            <div class="tag">📌湿地沼泽常见</div>
            <div class="tag">💊含灯心草素</div>
        </div>

        <!-- 苍耳子 -->
        <div class="card">
            <h2>苍耳子 | 祛风除湿通窍</h2>
            <div class="plant-img" style="background: #fff3e0; text-align: center">
                <img width="100%" height="200px" src="https://self-bucket-1258377547.cos.ap-shanghai.myqcloud.com/picgo-test/e33fd0d2d7ddc5efcb7b3f27b30d1bf6.jpeg">
            </div>
            <p>果实密生倒钩刺，叶三角状卵形。散风寒，通鼻窍，祛风湿，注意果实有毒慎用。</p>
            <div class="tag">📌路边荒地丛生</div>
            <div class="tag">💊含苍耳子甙</div>
        </div>

        <!-- 龙葵 -->
        <div class="card">
            <h2>龙葵 | 清热解毒消肿</h2>
            <div class="plant-img" style="background: #e8f5e9; text-align: center">
                <img width="100%" height="200px" src="https://self-bucket-1258377547.cos.ap-shanghai.myqcloud.com/picgo-test/a6a3570fba48d893008586d926a1e253.jpg">
            </div>
            <p>浆果黑亮似珍珠，白花黄蕊五月开。清热解毒，活血消肿，成熟果实可少量食用。</p>
            <div class="tag">📌田间地头常见</div>
            <div class="tag">💊含龙葵碱</div>
        </div>

        <p style="text-align: center; color: #666; font-size: 0.9em;">🌱遇见请珍惜 勿过度采摘 | 药用请遵医嘱</p>
    </div>
</body>
</html>
